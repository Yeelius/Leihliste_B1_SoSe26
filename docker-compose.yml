# docker-compose.yml
# Orchestriert alle Container für LeihListe
# Starten: docker compose up
# Stoppen: docker compose down

services:

  # MariaDB Datenbank Container
  # Startet zuerst — Django braucht die DB zum Verbinden
  datenbank:
    image: mariadb:11
    environment:
      MYSQL_DATABASE: leihliste
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: leihliste_user
      MYSQL_PASSWORD: leihliste_pass
    ports:
      - "3306:3306"
    # Volume verhindert Datenverlust bei Neustart
    volumes:
      - db_daten:/var/lib/mysql
    # Healthcheck — Django wartet bis DB wirklich bereit ist
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend Container
  # Startet nach MariaDB — wegen depends_on
  backend:
    build: ./src/backend/datenbank
    ports:
      - "8000:8000"
    # Wartet bis Datenbank wirklich bereit ist
    depends_on:
      datenbank:
        condition: service_healthy
    environment:
      DB_NAME: leihliste
      DB_USER: leihliste_user
      DB_PASSWORD: leihliste_pass
      DB_HOST: datenbank
      DB_PORT: 3306
    # Damit Änderungen direkt in Container synchronisiert werden und dieser nicht immer manuell neu gebaut werden muss
    volumes:
      - ./src/backend/datenbank:/app
    # Bei jedem Start: migrate + seed_data + runserver
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

# Persistente Datenspeicherung
# Daten bleiben auch nach docker compose down erhalten
volumes:
  db_daten: